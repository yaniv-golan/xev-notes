name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ludeeus/action-shellcheck@master
      with:
        scandir: './xev-cli'
        additional_files: './xev-mcp/tools/*/tool.sh ./tools/bump-version.sh'

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo apt-get update && sudo apt-get install -y jq pandoc
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          brew install jq pandoc
        fi
      shell: bash
    - name: Run tests
      run: bash xev-cli/test/run_tests.sh

  mcp-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate MCP tool schemas
      run: |
        for f in xev-mcp/tools/*/tool.meta.json; do
          jq -e '.name and .description and .inputSchema' "$f" > /dev/null || {
            echo "FAIL: $f missing required fields"; exit 1;
          }
          echo "OK: $f"
        done

  version-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check version consistency
      run: |
        V=$(cat VERSION | tr -d '[:space:]')
        echo "VERSION: ${V}"
        jq -e --arg v "$V" '.version == $v' .claude-plugin/plugin.json > /dev/null || { echo "FAIL: .claude-plugin/plugin.json"; exit 1; }
        jq -e --arg v "$V" '.version == $v' .cursor-plugin/plugin.json > /dev/null || { echo "FAIL: .cursor-plugin/plugin.json"; exit 1; }
        grep -q "version: \"$V\"" skills/xev-evernote/SKILL.md || { echo "FAIL: SKILL.md"; exit 1; }
        echo "All versions match ${V}"
