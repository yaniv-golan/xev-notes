name: Bug Report
description: Report a bug in xev-cli or xev-mcp
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `xev-cli search "..."`
        2. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened
  - type: textarea
    id: error
    attributes:
      label: Error output
      placeholder: Paste the JSON error or terminal output
      render: json
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
